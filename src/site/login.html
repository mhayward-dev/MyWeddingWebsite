<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cansu & Mark ♥ Civil Ceremony</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">
    <div class="auth-container">
        <div class="auth-modal">
            <!-- Language Selector -->
            <div class="language-bar">
                <button class="lang-btn" data-lang="en" title="English">
                    <svg class="flag-icon" viewBox="0 0 60 30" width="32" height="16">
                        <clipPath id="t"><path d="M30,15 h30 v15 z v15 h-30 z h-30 v-15 z v-15 h30 z"/></clipPath>
                        <path d="M0,0 v30 h60 v-30 z" fill="#00247d"/>
                        <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
                        <path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#t)" stroke="#cf142b" stroke-width="4"/>
                        <path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/>
                        <path d="M30,0 v30 M0,15 h60" stroke="#cf142b" stroke-width="6"/>
                    </svg>
                </button>
                <button class="lang-btn" data-lang="de" title="Deutsch">
                    <svg class="flag-icon" viewBox="0 0 5 3" width="32" height="20">
                        <rect width="5" height="3" fill="#000"/>
                        <rect width="5" height="2" y="1" fill="#D00"/>
                        <rect width="5" height="1" y="2" fill="#FFCE00"/>
                    </svg>
                </button>
                <button class="lang-btn" data-lang="tr" title="Türkçe">
                    <svg class="flag-icon" viewBox="0 0 1200 800" width="32" height="20">
                        <rect fill="#E30A17" width="1200" height="800"/>
                        <circle fill="#fff" cx="425" cy="400" r="200"/>
                        <circle fill="#E30A17" cx="475" cy="400" r="160"/>
                        <polygon fill="#fff" points="650,400 609,414 609,457 583,422 542,435 567,400 542,365 583,378 609,343 609,387"/>
                    </svg>
                </button>
            </div>

            <h2 class="auth-title" data-i18n="authTitle">Cansu & Mark<br>Civil Ceremony</h2>
            <p class="auth-subtitle" data-i18n="authSubtitle">Please enter the password to view this page</p>
            <form id="authForm" class="auth-form">
                <input type="password" id="authPassword" data-i18n-placeholder="passwordPlaceholder" placeholder="Enter password" autocomplete="off" required>
                <button type="submit" data-i18n="enterButton">Enter</button>
            </form>
            <p id="authError" class="auth-error" style="display: none;" data-i18n="authError">Incorrect password</p>
        </div>
    </div>

    <script src="js/i18n.js"></script>

    <script>
        const Auth = {
            TOKEN_KEY: 'wedding_auth_token',
            EXPIRY_KEY: 'wedding_auth_expiry',

            isAuthenticated() {
                const token = localStorage.getItem(this.TOKEN_KEY);
                const expiry = localStorage.getItem(this.EXPIRY_KEY);
                
                if (!token || !expiry) return false;
                
                // Check if token has expired
                if (Date.now() > parseInt(expiry, 10)) {
                    this.clearAuth();
                    return false;
                }
                
                return true;
            },

            setAuth(token, expiresAt) {
                localStorage.setItem(this.TOKEN_KEY, token);
                localStorage.setItem(this.EXPIRY_KEY, expiresAt.toString());
            },

            clearAuth() {
                localStorage.removeItem(this.TOKEN_KEY);
                localStorage.removeItem(this.EXPIRY_KEY);
            },

            getRedirectUrl() {
                const params = new URLSearchParams(window.location.search);
                return params.get('redirect') || '/';
            },

            async verifyPassword(password) {
                try {
                    const response = await fetch('/api/auth', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok && data.success) {
                        this.setAuth(data.token, data.expiresAt);
                        return { success: true };
                    } else {
                        return { success: false, error: data.error || 'Invalid password' };
                    }
                } catch (error) {
                    console.error('Auth error:', error);
                    return { success: false, error: 'Connection error. Please try again.' };
                }
            },

            init() {
                // If already authenticated, redirect immediately
                if (this.isAuthenticated()) {
                    window.location.replace(this.getRedirectUrl());
                    return;
                }

                const form = document.getElementById('authForm');
                const input = document.getElementById('authPassword');
                const errorEl = document.getElementById('authError');

                // Focus password input
                setTimeout(() => input.focus(), 100);

                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const password = input.value.trim();
                    if (!password) return;
                    
                    const submitBtn = form.querySelector('button[type="submit"]');
                    const originalText = submitBtn.textContent;
                    submitBtn.disabled = true;
                    submitBtn.textContent = '...';
                    errorEl.style.display = 'none';
                    
                    const result = await this.verifyPassword(password);
                    
                    if (result.success) {
                        window.location.replace(this.getRedirectUrl());
                    } else {
                        errorEl.textContent = result.error;
                        errorEl.style.display = 'block';
                        input.value = '';
                        input.focus();
                        submitBtn.disabled = false;
                        submitBtn.textContent = originalText;
                    }
                });
            }
        };

        // Login page translations
        const loginTranslations = {
            en: {
                pageTitle: "Login - Cansu & Mark ♥ Civil Ceremony",
                authTitle: "Cansu & Mark<br>Civil Ceremony",
                authSubtitle: 'Please enter the password to view this page',
                passwordPlaceholder: 'Enter password',
                enterButton: 'Enter',
                authError: 'Incorrect password',
                connectionError: 'Connection error. Please try again.'
            },
            de: {
                pageTitle: 'Login - Cansu & Mark ♥ Standesamtliche Trauung',
                authTitle: 'Cansu & Mark<br>Standesamtliche Trauung',
                authSubtitle: 'Bitte gib das Passwort ein, um diese Seite anzuzeigen',
                passwordPlaceholder: 'Passwort eingeben',
                enterButton: 'Eintreten',
                authError: 'Falsches Passwort',
                connectionError: 'Verbindungsfehler. Bitte versuche es erneut.'
            },
            tr: {
                pageTitle: "Giriş - Cansu & Mark ♥ Resmi Nikahı",
                authTitle: "Cansu & Mark<br>Resmi Nikahı",
                authSubtitle: 'Bu sayfayı görüntülemek için şifreyi girin',
                passwordPlaceholder: 'Şifre girin',
                enterButton: 'Giriş',
                authError: 'Yanlış şifre',
                connectionError: 'Bağlantı hatası. Lütfen tekrar deneyin.'
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            i18n.init(loginTranslations);
            Auth.init();
        });
    </script>
</body>
</html>
